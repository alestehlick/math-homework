        {
          stem: String.raw`
            <p>In the ASA proof, what is the real purpose of constructing the point \(X\)?</p>
          `,
          choices: [
            String.raw`It creates a comparison triangle so that SAS can be used first.`,
            String.raw`It shows that \(BC\) is perpendicular to \(B'C'\).`,
            String.raw`It lets us use the theorem that the angles of a triangle add to \(180^\circ\).`,
            String.raw`It proves that \(A'\) is the midpoint of \(BX\).`,
            String.raw`It forces both triangles to be right triangles.`,
            String.raw`It makes \(\triangle A'B'C'\) isosceles.`

        {
          stem: String.raw`
            <p>Refer to Figure 2. Suppose \(AB \cong A'B'\), \(AC \cong A'C'\), and \(BC \cong B'C'\).</p>
            <p>Which ordering gives the correct main outline of the proof of SSS in your notes?</p>
            <ol type="I">
              <li>Construct a ray \(A'Y\) so that \(\angle B'A'Y \cong \angle BAC\), and on that ray choose \(X\) so that \(A'X \cong AC\).</li>
              <li>Use SAS to prove \(\triangle ABC \cong \triangle A'B'X\).</li>
              <li>Deduce \(A'X \cong A'C'\) and \(B'X \cong B'C'\), so \(\triangle A'C'X\) and \(\triangle B'C'X\) are isosceles.</li>
              <li>Use those isosceles triangles to obtain angle equalities that imply \(\angle A'C'B' \cong \angle A'XB'\).</li>
              <li>Use that angle equality, together with \(A'C' \cong A'X\) and \(B'C' \cong B'X\), to prove \(\triangle A'C'B' \cong \triangle A'XB'\) by SAS.</li>
              <li>Since \(\triangle ABC \cong \triangle A'B'X\) and \(\triangle A'B'X \cong \triangle A'B'C'\), conclude \(\triangle ABC \cong \triangle A'B'C'\).</li>
            </ol>
          `,

        {
          stem: String.raw`
            <p>In the proof of SSS, why do the isosceles triangles matter?</p>
          `,
          choices: [
            String.raw`They show that \(\triangle ABC\) and \(\triangle A'B'C'\) are right triangles.`,
            String.raw`They produce a midpoint needed for the Exterior Angle Theorem.`,
            String.raw`They show that \(A'B'\) is the longest side, so the triangles must be congruent.`,
            String.raw`They allow the use of the theorem that the angles of a triangle add to \(180^\circ\).`,
            String.raw`They create angle equalities that allow SAS to identify the auxiliary triangle with the target triangle.`,
            String.raw`They show that \(B'C'\) must be perpendicular to \(A'X\).`
          ],

        {
          stem: String.raw`
            <p>Refer to Figure 3. Let \(e\) be the exterior angle at \(C\).</p>
            <p>Which ordering gives the correct main outline of the proof that an exterior angle is larger than either non-adjacent interior angle?</p>
            <ol type="I">
              <li>Let \(M\) be the midpoint of \(AC\).</li>
              <li>Choose \(P\) on the ray \(BM\) so that \(BM \cong MP\).</li>
              <li>Use SAS to prove \(\triangle AMB \cong \triangle CMP\).</li>
              <li>Conclude that \(\angle A \cong \angle ACP\).</li>
              <li>Since \(\angle ACP\) is only a part of the exterior angle \(e\), conclude that \(e > \angle A\).</li>
              <li>Repeat the same idea with the corresponding construction on the other side to obtain \(e > \angle B\).</li>

            <p>After the proof has established \(\angle A \cong \angle ACP\), which observation is the one that finally yields \(e > \angle A\)?</p>
          `,

            `,

        {
          stem: String.raw`
            <p>Refer to Figure 4. Suppose \(BC \cong B'C'\), \(\angle B \cong \angle B'\), and \(\angle A \cong \angle A'\).</p>
            <p>Which ordering gives the correct main outline of the proof of SAA?</p>
            <ol type="I">
              <li>Assume first that \(AB > A'B'\), and choose \(P\) on the segment \(BA\) so that \(BP \cong B'A'\).</li>
              <li>Use SAS to prove \(\triangle PBC \cong \triangle A'B'C'\).</li>
              <li>Conclude that \(\angle BPC \cong \angle A'\), hence \(\angle BPC \cong \angle A\).</li>
              <li>But \(\angle BPC\) is an exterior angle of \(\triangle APC\), so by the Exterior Angle Theorem it must be larger than \(\angle A\), a contradiction.</li>
              <li>Argue similarly that \(AB < A'B'\) is also impossible.</li>
              <li>Therefore \(AB \cong A'B'\), and now SAS gives \(\triangle ABC \cong \triangle A'B'C'\).</li>
            </ol>
          `,
