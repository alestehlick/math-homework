            String.raw`False, False, False`

          choiceWrap: false

            String.raw`\(p \to q\)`,
            String.raw`\(q \to p\)`

          choiceWrap: false

        {
          stem: String.raw`

          `,
          choices: [
            String.raw`\(q \to p\)`,
            String.raw`\(p \land q\)`,
            String.raw`\(p \lor q\)`,
            String.raw`\(p \to q\)`,
            String.raw`\(\neg p \to q\)`,
            String.raw`\(p \to \neg q\)`
          ],
          choiceWrap: false
        },

        {

            String.raw`False, because the hypothesis is true and the conclusion is false.`,
            String.raw`True, because the hypothesis is true.`,
            String.raw`True, because the conclusion is false.`,

            String.raw`It cannot be determined unless the statement is written in words.`
          ],
          choiceWrap: false

            String.raw`Yes. It is false when \(x=6\).`,
            String.raw`Yes. It is false when \(x=-3\).`,

          choiceWrap: false

            String.raw`\(p \to \neg p\)`,
            String.raw`\((p \land q) \lor (\neg p \land q)\)`,
            String.raw`\(p \land q\)`,
            String.raw`\((p \lor q) \to p\)`

          choiceWrap: false

          choiceWrap: false

        {
          stem: String.raw`
            <p>For which truth values of \(p\) and \(q\) is the following proposition true?</p>
            <p class="math">\((p \lor q) \land (\neg p \lor q) \land (p \lor \neg q)\)</p>
          `,
          choices: [
            String.raw`Only when \(p\) is true and \(q\) is true.`,
            String.raw`Only when \(p\) is true and \(q\) is false.`,
            String.raw`Only when \(p\) is false and \(q\) is true.`,
            String.raw`Only when \(p\) is false and \(q\) is false.`,
            String.raw`It is true in every row, so it is a tautology.`,
            String.raw`It is false in every row, so it is a contradiction.`
          ],
          choiceWrap: false

        {
          stem: String.raw`
            <p>Consider the proposition below.</p>

          `,
          choices: [
            String.raw`It is not a tautology, because \(p\) and \(r\) are unrelated simple propositions.`,

          choiceWrap: false

        {
