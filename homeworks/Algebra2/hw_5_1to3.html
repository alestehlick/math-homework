          stem: String.raw`
            <p>A line through the \(y\)-intercept of \(y=ax^2+bx+c\) with slope \(m\) has equation \(y=mx+c\). Solving the system gives</p>
            <p class="math">\[ax^2+bx+c=mx+c,\quad \text{so}\quad ax^2+(b-m)x=0.\]</p>
            <p>Which conclusion correctly explains the slope of the tangent line at the \(y\)-intercept?</p>
          `,
          choices: [
            String.raw`The tangent slope is \(a\), because \(a\) controls the curvature of the parabola.`,
            String.raw`The tangent slope is \(b\), because when \(m=b\), the intersection equation becomes \(ax^2=0\), giving only \(x=0\).`,
            String.raw`The tangent slope is \(c\), because \(c\) is the \(y\)-intercept.`,
            String.raw`The tangent slope is \(-b\), because the tangent line must cancel the middle term of the quadratic.`,
            String.raw`Every value of \(m\) works, because every line through the \(y\)-intercept touches the graph there.`,

          `,

            String.raw`\(a=3\) gives the \(y\)-intercept, \(b=12\) gives the opening direction, and \(c=7\) gives the curvature.`,

            String.raw`The expanded form should still have \(c=-5\), because the graph was shifted down \(5\) units.`,
