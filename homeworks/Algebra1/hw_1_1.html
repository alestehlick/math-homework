    function axisArrowLeft(x, y) {
      return `<polygon points="${x},${y} ${x + 8},${y - 4} ${x + 8},${y + 4}" fill="#222"></polygon>`;
    }

    function axisArrowRight(x, y) {
      return `<polygon points="${x},${y} ${x - 8},${y - 4} ${x - 8},${y + 4}" fill="#222"></polygon>`;
    }

    function axisArrowUp(x, y) {
      return `<polygon points="${x},${y} ${x - 4},${y + 8} ${x + 4},${y + 8}" fill="#222"></polygon>`;
    }

    function axisArrowDown(x, y) {
      return `<polygon points="${x},${y} ${x - 4},${y - 8} ${x + 4},${y - 8}" fill="#222"></polygon>`;
    }

    function hLineSvg({ min, max, step, dot, width = 330, height = 78, fontSize = 12 }) {
      const margin = 22;
      const axisY = 24;
      const tick = 7;
      const labelY = 52;
      const innerWidth = width - 2 * margin;
      const values = [];
      for (let v = min; v <= max + 1e-9; v += step) values.push(v);
      const x = (v) => margin + ((v - min) / (max - min)) * innerWidth;

      const ticks = values.map((v) => `
        <line x1="${x(v)}" y1="${axisY - tick}" x2="${x(v)}" y2="${axisY + tick}" stroke="#222" stroke-width="1.5"></line>
        <text x="${x(v)}" y="${labelY}" text-anchor="middle" font-size="${fontSize}" font-family="Arial, sans-serif" fill="#222">${v}</text>
      `).join('');

      const dotSvg = dot === null || dot === undefined ? '' : `
        <circle cx="${x(dot)}" cy="${axisY}" r="5.5" fill="#222"></circle>
      `;

      return `
        <svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Horizontal number line from ${min} to ${max}">
          <line x1="${margin}" y1="${axisY}" x2="${width - margin}" y2="${axisY}" stroke="#222" stroke-width="2"></line>
          ${axisArrowLeft(margin - 2, axisY)}
          ${axisArrowRight(width - margin + 2, axisY)}
          ${ticks}
          ${dotSvg}
        </svg>
      `;
    }

    function vLineSvg({ min, max, step, dot, width = 110, height = 290, fontSize = 12 }) {
      const axisX = 54;
      const margin = 22;
      const tick = 7;
      const labelX = 34;
      const innerHeight = height - 2 * margin;
      const values = [];
      for (let v = min; v <= max + 1e-9; v += step) values.push(v);
      const y = (v) => height - margin - ((v - min) / (max - min)) * innerHeight;

      const ticks = values.map((v) => `
        <line x1="${axisX - tick}" y1="${y(v)}" x2="${axisX + tick}" y2="${y(v)}" stroke="#222" stroke-width="1.5"></line>
        <text x="${labelX}" y="${y(v) + 4}" text-anchor="end" font-size="${fontSize}" font-family="Arial, sans-serif" fill="#222">${v}</text>
      `).join('');

      const dotSvg = dot === null || dot === undefined ? '' : `
        <circle cx="${axisX}" cy="${y(dot)}" r="5.5" fill="#222"></circle>
      `;

      return `
        <svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vertical number line from ${min} to ${max}">
          <line x1="${axisX}" y1="${margin}" x2="${axisX}" y2="${height - margin}" stroke="#222" stroke-width="2"></line>
          ${axisArrowUp(axisX, margin - 2)}
          ${axisArrowDown(axisX, height - margin + 2)}
          ${ticks}
          ${dotSvg}
        </svg>
      `;
    }

    function choiceWrap(html) {
      return `<div class="mini-choice">${html}</div>`;
    }

    function figureWrap(html, caption) {
      return `
        <figure>

          <figcaption>${caption}</figcaption>
        </figure>
      `;
    }
